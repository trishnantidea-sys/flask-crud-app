<!DOCTYPE html>
<html>
<head>
    <title>Gudang D&L</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, #1f2937, #111827);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: #60a5fa;
            text-decoration: none;
            margin-left: 15px;
        }

        /* 🔥 CONTAINER FIX */
        .container {
            width: 90%;
            max-width: 1000px; /* penting */
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #1f2937;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        tr:hover {
            background: #e0f2fe;
        }

        /* BUTTON */
        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div><strong>Gudang D&L</strong></div>

    <div>
        {% if session.get('user_id') %}
            Halo, {{ session.get('full_name') or session.get('username') }} |
            <a href="{{ url_for('index') }}">Dashboard</a>
            <a href="{{ url_for('add_package') }}">Tambah Paket</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Register</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    Gudang Ekspedisi D&L © 2026
</footer>

</body>
</html>
