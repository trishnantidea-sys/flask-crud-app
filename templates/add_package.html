{% extends 'base.html' %}

{% block content %}
<h2>Tambah Paket Baru</h2>

<form method="POST">
    <div>
        <label>Nomor Resi:</label><br>
        <input type="text" name="resi" placeholder="EXP001" required>
    </div>
    
    <div>
        <label>Kategori:</label><br>
        <select name="category" required>
            <option value="Alat Olahraga">Alat Olahraga</option>
            <option value="Kebutuhan Rumah Tangga">Kebutuhan Rumah Tangga</option>
            <option value="ATK (Alat Tulis Kantor)">ATK (Alat Tulis Kantor)</option>
            <option value="Dokumen">Dokumen</option>
            <option value="Elektronik">Elektronik</option>
            <option value="Pakaian/Tekstil">Pakaian/Tekstil</option>
            <option value="Sparepart">Sparepart</option>
        </select>
    </div>

    <div>
        <label>Nama Pengirim:</label><br>
        <input type="text" name="sender" required>
    </div>

    <div>
        <label>No. HP Pengirim:</label><br>
        <input type="text" name="sender_phone" required>
    </div>

    <div>
        <label>Nama Penerima:</label><br>
        <input type="text" name="receiver" required>
    </div>

    <div>
        <label>No. HP Penerima:</label><br>
        <input type="text" name="receiver_phone" required>
    </div>

    <div>
        <label>Alamat Tujuan:</label><br>
        <textarea name="destination_address" rows="3" required></textarea>
    </div>

    <div>
        <label>Berat (kg):</label><br>
        <input type="number" step="0.1" name="weight" required>
    </div>

    <div>
        <label>Tanggal Pengiriman:</label><br>
        <input type="text" name="shipping_date" placeholder="DD-MM-YYYY" required>
    </div>

    <div>
        <label>Jenis Pengiriman:</label><br>
        <select name="shipping_type" required>
            <option value="D&L Reguler">D&L Reguler</option>
            <option value="D&L Eco (Ekonomis)">D&L Eco (Ekonomis)</option>
            <option value="D&L Super (Kilat)">D&L Super (Kilat)</option>
            <option value="D&L Cargo">D&L Cargo</option>
        </select>
    </div>

    <div style="margin-top: 20px;">
        <button type="submit">Simpan Paket</button>
        <a href="{{ url_for('index') }}">Batal</a>
    </div>
</form>
{% endblock %}
