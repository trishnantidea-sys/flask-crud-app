{% extends 'base.html' %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding: 25px; border: 1px solid #ddd; border-radius: 8px; background: white;">

    <h3 style="margin-bottom: 10px;">Register Account</h3>
    <p style="color: gray; font-size: 14px; margin-bottom: 20px;">
        Create your account
    </p>

    <form method="POST">

        <div>
            <label>Username</label><br>
            <input type="text" name="username" required>
        </div>

        <div>
            <label>Password</label><br>
            <input type="password" name="password" required>
        </div>

        <hr style="margin: 15px 0;">

        <div>
            <label>Full Name</label><br>
            <input type="text" name="full_name" required>
        </div>

        <div>
            <label>Email Address</label><br>
            <input type="email" name="email" required>
        </div>

        <div>
            <label>Gender</label><br>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div>
            <label>Age</label><br>
            <input type="number" name="age">
        </div>

        <div>
            <label>Occupation</label><br>
            <input type="text" name="occupation">
        </div>

        <div>
            <label>City</label><br>
            <input type="text" name="city">
        </div>

        <div>
            <label>Phone</label><br>
            <input type="text" name="phone">
        </div>

        <div style="margin-top: 20px;">
            <button type="submit" style="width:100%; padding:10px; background:#2563eb; color:white; border:none; border-radius:6px;">
                Daftar Akun
            </button>
        </div>

    </form>

    <p style="margin-top:15px; text-align:center;">
        Sudah punya akun? <a href="{{ url_for('login') }}">Log in</a>
    </p>

</div>
{% endblock %}
